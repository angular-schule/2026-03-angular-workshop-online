<form>
    <div class="form-group">
        @let isbnField = bookForm.isbn;
        <label for="isbnInput">ISBN</label>
        <input type="text" id="isbnInput" class="form-control"
            [formField]="isbnField"
            [aria-invalid]="isbnField().touched() ? isbnField().invalid() : null"
            [aria-errormessage]="isbnField().invalid() && isbnField().touched() ? 'isbnErrors' : null">

        <pre>valid: {{ isbnField().valid() }}</pre>

        @if (isbnField().invalid() && isbnField().touched()) {
            <ul id="isbnErrors">
                @for (e of isbnField().errors(); track e.kind) {
                    <li>{{ e.message }}</li>
                }
            </ul>
        }
    </div>
    
    <div class="form-group">
        <label for="titleInput">Title</label>
        <input type="text" id="titleInput" class="form-control" [formField]="bookForm.title">
    </div>
    
    <div class="form-group">
        <label for="descInput">Description</label>
        <textarea id="descInput" class="form-control" [formField]="bookForm.description"></textarea>
    </div>

    <div class="form-group">
        <label for="priceInput">Price</label>
        <input type="number" id="priceInput" class="form-control" [formField]="bookForm.price">
    </div>
    
    <div class="form-group">
        <label for="ratingInput">Rating</label>
        <input type="number" id="ratingInput" class="form-control" [formField]="bookForm.rating">
    </div>

    <fieldset class="form-group">
        <legend>Authors</legend>
        <button type="button" class="btn btn-yellow" (click)="addAuthorField()">+ Author</button>

        @for (authorField of bookForm.authors; track authorField) {
            <input type="text" class="form-control" [formField]="authorField" aria-label="Author {{ $index + 1 }}">
        }
    </fieldset>

    <button type="submit" class="btn btn-green">Submit</button>
</form>

<pre>{{ bookData() | json }}</pre>
