<article class="card mb-4">
  <div class="card-body bg-light">
    <img class="img-thumbnail float-end" alt=""
      src="https://api.angular.schule/avatar/{{ book().rating }}">
    <header class="card-title">
      <h2>{{ book().title }}</h2>
      <app-rating-display [value]="book().rating" />
    </header>
    <p><strong>Autoren:</strong> {{ book().authors.join(', ') }}</p>
    <p>{{ book().description }}</p>
    <p><strong>Preis:</strong> {{ book().price | currency:'EUR' }}</p>

    <button type="button" class="btn btn-red" aria-label="Rate down" (click)="doRateDown()" [disabled]="book().rating <= minRating()"> – </button>
    <button type="button" class="btn btn-green" aria-label="Rate up" (click)="doRateUp()" [disabled]="book().rating >= maxRating()"> + </button>
    <button type="button" class="btn btn-yellow" (click)="doDelete()">Löschen</button>

    <a [routerLink]="['/books', book().isbn]">Details</a>
    
    <!--<a routerLink="/books">Dashboard</a>
    <a routerLink="{{ book().isbn }}">Details</a>
    <a routerLink="/books/{{ book().isbn }}">Details</a>
    <a [routerLink]="'/books/' + book().isbn">Details</a>
    <a [routerLink]="[book().isbn]">Details</a>
    <a [routerLink]="['..', 'books', book().isbn]">Details</a>
    <a [routerLink]="book().isbn">Details</a>-->
  </div>
</article>
