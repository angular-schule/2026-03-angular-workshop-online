<article class="card mb-4">
  <div class="card-body bg-light">
    <img class="img-thumbnail float-end" alt=""
      src="https://api.angular.schule/avatar/{{ book().rating }}">
    <header class="card-title">
      <h2>{{ book().title }}</h2>
      <span class="badge rounded-pill text-bg-secondary">
        Bewertung: {{ book().rating }}
      </span>
    </header>
    <p><strong>Autoren:</strong> {{ book().authors.join(', ') }}</p>
    <p>{{ book().description }}</p>
    <p><strong>Preis:</strong> {{ book().price }}</p>

    <button type="button" class="btn btn-red" aria-label="Rate down" (click)="doRateDown()"> – </button>
    <button type="button" class="btn btn-green" aria-label="Rate up" (click)="doRateUp()"> + </button>
  </div>
</article>
