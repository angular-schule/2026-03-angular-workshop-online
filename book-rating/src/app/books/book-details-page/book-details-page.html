@if (book.isLoading()) {
    <div aria-busy="true">Buch wird geladen …</div>
}

@let error = book.error();
@if (error) {
    <div>Fehler beim Laden! {{ error.message }}</div>
}

@if (book.hasValue()) {
    @let b = book.value();
    <h2>{{ b.title }}</h2>
    <p>{{ b.description }}</p>
}
